name: 🚀 Deploy Workflow

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================================
  # ✅ VALIDATION (branche dev ou tag)
  # ============================================================
  validate-dev:
    name: 🔍 Validate Build
    if: startsWith(github.ref, 'refs/heads/dev') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧹 Lint code
        run: yarn lint

      - name: 🏗️ Build project
        run: yarn build

      - name: 🧪 Run tests (if defined)
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            echo "🧪 Running tests..."
            yarn test
          else
            echo "⚠️ No tests found, skipping."
          fi

  # ============================================================
  # 🚀 RELEASE (tag v*)
  # ============================================================
  release:
    name: 🚀 Merge & Release
    needs: [validate-dev]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.validate-dev.result == 'success' || needs.validate-dev.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 🧭 Ensure or create main branch
        run: |
          if ! git ls-remote --exit-code origin main >/dev/null 2>&1; then
            echo "⚠️ Branch 'main' does not exist. Creating it from current branch..."
            git checkout -b main
            git push origin main
          else
            echo "✅ Branch 'main' already exists."
          fi

      - name: 🔄 Merge dev → main
        run: |
          git fetch origin main dev
          git checkout main
          git merge origin/dev --no-ff -m "🚀 Release ${{ github.ref_name }}"
          git push origin main

      - name: 📝 Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Generating changelog since tag: ${PREV_TAG:-<initial commit>}"
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- [%h] %s" --no-merges)
          else
            LOG=$(git log $PREV_TAG..HEAD --pretty=format:"- [%h] %s" --no-merges)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🧾 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '🚀 Release ${{ github.ref_name }}'
          body: |
            ## 🚀 Release ${{ github.ref_name }}
            ### 🪄 Changements :
            ${{ steps.changelog.outputs.log }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
